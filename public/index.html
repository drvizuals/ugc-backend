<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGC Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#060608;--paper:#0d0d10;--lift:#13131a;--edge:#1f1f2e;--edge2:#2a2a3e;
  --gold:#e8b84b;--ice:#4be8c8;--ice-dim:#0f3a30;
  --red:#e84b4b;--green:#4bdb8a;--txt:#d0cce0;--mute:#55526a;
  --mono:'Space Mono',monospace;--display:'Bebas Neue',sans-serif;
}
body{background:var(--ink);color:var(--txt);font-family:var(--mono);font-size:13px;padding:20px 16px 80px;max-width:640px;margin:0 auto}
h1{font-family:var(--display);font-size:36px;letter-spacing:2px;color:#fff;margin-bottom:4px}
h1 em{color:var(--gold);font-style:normal}
.sub{font-size:9px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;margin-bottom:24px}
.sources{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.src{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:2px;border:1px solid var(--edge2);color:var(--mute)}
.src.active{border-color:var(--ice);color:var(--ice)}
.panel{background:var(--paper);border:1px solid var(--edge);border-radius:3px;padding:16px;margin-bottom:16px}
.plbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:9px;letter-spacing:1.5px;color:var(--mute);text-transform:uppercase;margin-bottom:4px}
.fld input{width:100%;background:var(--ink);border:1px solid var(--edge2);color:var(--txt);font-family:var(--mono);font-size:12px;padding:9px 11px;border-radius:2px;outline:none;transition:border-color .2s}
.fld input:focus{border-color:var(--gold)}
.btns{margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 16px;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:var(--gold);color:#000;font-weight:700}
.btn-green{background:var(--green);color:#000;font-weight:700}
.btn-ghost{background:transparent;border:1px solid var(--edge2);color:var(--mute)}
.log{background:var(--ink);border:1px solid var(--edge);border-radius:3px;padding:12px;font-size:11px;line-height:1.8;max-height:140px;overflow-y:auto;margin-bottom:16px;display:none}
.lr{display:flex;gap:10px}
.lt{color:var(--mute);min-width:56px;font-size:10px;flex-shrink:0}
.lm.gold{color:var(--gold)}.lm.ice{color:var(--ice)}.lm.red{color:var(--red)}.lm.green{color:var(--green)}.lm.mute{color:var(--mute)}
.stats{display:flex;gap:16px;margin-bottom:16px;font-size:11px;color:var(--mute);display:none}
.stats span{color:var(--ice)}
.lead{border:1px solid var(--edge);border-radius:3px;padding:14px;margin-bottom:10px;position:relative;transition:border-color .2s}
.lead.approved{border-color:var(--ice)}
.lead.rejected{opacity:.3}
.lead.sent{border-color:var(--green)}
.lname{font-family:var(--display);font-size:18px;color:#fff;margin-bottom:5px}
.lmeta{font-size:10px;color:var(--mute);margin-bottom:8px;line-height:1.7}
.lemail{color:var(--gold)}
.lsource{color:var(--mute)}
.sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sbar{flex:1;height:2px;background:var(--edge);border-radius:1px;overflow:hidden}
.sfill{height:100%;border-radius:1px}
.sval{font-size:10px;min-width:28px;text-align:right}
.reason{font-size:10px;color:var(--mute);font-style:italic;margin-bottom:10px}
.esubj{color:var(--gold);font-size:11px;font-weight:700;margin-bottom:6px}
.ebody{font-size:11px;color:#aaa;white-space:pre-wrap;background:var(--ink);border:1px solid var(--edge);border-radius:2px;padding:10px;margin-bottom:10px;min-height:80px}
.ebody[contenteditable="true"]{outline:none;border-color:var(--gold)}
.actions{display:flex;gap:8px;align-items:center}
.la{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 9px;border-radius:2px;cursor:pointer;border:none}
.la-app{background:var(--ice-dim);color:var(--ice)}.la-app:hover{background:var(--ice);color:#000}
.la-rej{background:#1a0a0a;color:var(--red)}.la-rej:hover{background:var(--red);color:#000}
.la-link{background:none;border:1px solid var(--edge2);color:var(--mute);text-decoration:none;padding:5px 9px;border-radius:2px;font-size:9px;letter-spacing:1px}
.sent-tag{position:absolute;top:14px;right:14px;font-size:9px;letter-spacing:2px;color:var(--green);text-transform:uppercase}
.tag{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-right:4px}
.t-saas{background:#12103a;color:#8899ff;border:1px solid #1e1b55}
.t-app{background:#0e2820;color:var(--ice);border:1px solid #154030}
.t-ai-tool{background:#0d1a1a;color:#4bffe8;border:1px solid #154040}
.t-fintech{background:#1a1205;color:var(--gold);border:1px solid #3a2808}
.t-hot{background:#2a1500;color:var(--gold);border:1px solid #5a3000}
.success{background:#051305;border:1px solid #1a4a1a;border-radius:3px;padding:20px;color:var(--green);text-align:center;margin-bottom:16px;display:none;line-height:2}
.success strong{font-family:var(--display);font-size:28px;display:block;letter-spacing:2px}
.err{background:#130505;border:1px solid #3a0f0f;border-radius:3px;padding:10px;color:var(--red);font-size:11px;margin-bottom:14px;display:none}
.spin{display:inline-block;width:9px;height:9px;border:1.5px solid transparent;border-top-color:currentColor;border-radius:50%;animation:rot .5s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{padding:40px 16px;text-align:center;color:var(--mute);font-size:11px;line-height:2.2}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-family:var(--display);font-size:14px;letter-spacing:1px;color:var(--ice)}
.section-count{font-size:10px;color:var(--mute)}
</style>
</head>
<body>

<h1>UGC<em>.</em>PIPELINE</h1>
<div class="sub">Live Scraping &middot; Railway + Resend &middot; Tech &amp; Apps Only</div>

<div class="sources">
  <div class="src active" id="src-reddit">Reddit</div>
  <div class="src active" id="src-ph">Product Hunt</div>
  <div class="src" id="src-static">12 Curated</div>
</div>

<div class="panel">
  <span class="plbl">Your Info</span>
  <div class="fld"><label>Your Name</label><input id="iName" placeholder="Daniel Rua" value="Daniel Rua"></div>
  <div class="fld"><label>Portfolio URL</label><input id="iPortfolio" placeholder="https://danielrua.my.canva.site/" value="https://danielrua.my.canva.site/"></div>
</div>

<div class="btns">
  <button class="btn btn-gold" id="runBtn" onclick="runPipeline()">&#9654; Run Pipeline</button>
  <button class="btn btn-ghost" id="approveBtn" onclick="approveAll()" style="display:none">Approve All</button>
  <button class="btn btn-green" id="sendBtn" onclick="sendAll()" style="display:none">Send Approved</button>
  <button class="btn btn-ghost" id="resetBtn" onclick="resetAll()" style="display:none">Reset</button>
</div>

<div class="err" id="errBox"></div>
<div class="success" id="successBox"><strong id="successNum"></strong>Emails sent via Resend &middot; Check resend.com/emails</div>
<div class="log" id="logBox"></div>
<div class="stats" id="statsBar">
  <div>Found: <span id="statFound">0</span></div>
  <div>Approved: <span id="statApproved">0</span></div>
  <div>Sent: <span id="statSent">0</span></div>
</div>
<div id="leadsWrap"></div>

<script>
var RAILWAY = window.location.origin;

var STATIC_LEADS = [
  {company:"Notion",category:"saas",contactEmail:"ugc@makenotion.com",contactHandle:null,needsContent:"App walkthrough videos",postedRecently:true,score:9,scoreReason:"Active UGC program, clear brief, direct email available",source:"Curated",sourceUrl:null},
  {company:"Captions AI",category:"ai-tool",contactEmail:null,contactHandle:"@captionsapp",needsContent:"AI video editing demos",postedRecently:true,score:9,scoreReason:"Perfect niche match for a filmmaker",source:"Curated",sourceUrl:null},
  {company:"Superhuman",category:"app",contactEmail:"creators@superhuman.com",contactHandle:"@superhuman",needsContent:"Testimonials from power users",postedRecently:true,score:8,scoreReason:"Direct email, paid opportunity",source:"Curated",sourceUrl:null},
  {company:"Runway ML",category:"ai-tool",contactEmail:"ugc@runwayml.com",contactHandle:null,needsContent:"Creation showcase and before/after",postedRecently:true,score:8,scoreReason:"AI video tool — ideal for a filmmaker",source:"Curated",sourceUrl:null},
  {company:"Loom",category:"saas",contactEmail:null,contactHandle:"@loom_partnerships",needsContent:"Async video use-case demos",postedRecently:true,score:8,scoreReason:"Video-first product, perfect for a filmmaker",source:"Curated",sourceUrl:null},
  {company:"Perplexity AI",category:"ai-tool",contactEmail:"partnerships@perplexity.ai",contactHandle:null,needsContent:"Real workflow and use case demos",postedRecently:true,score:7,scoreReason:"Growing fast, email available",source:"Curated",sourceUrl:null},
  {company:"Descript",category:"saas",contactEmail:"ugc@descript.com",contactHandle:null,needsContent:"Screen recording and commentary",postedRecently:false,score:7,scoreReason:"Video editing tool — natural fit",source:"Curated",sourceUrl:null},
];

var builtLeads = [];
var decisions = {};
var sentSet = {};

function ts(){ return new Date().toLocaleTimeString("en-US",{hour12:false}); }

function addLog(msg, type){
  var box = document.getElementById("logBox");
  box.style.display = "block";
  var row = document.createElement("div");
  row.className = "lr";
  row.innerHTML = '<span class="lt">'+ts()+'</span><span class="lm '+(type||"mute")+'">'+msg+'</span>';
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function showErr(msg){
  var b = document.getElementById("errBox");
  b.textContent = msg; b.style.display = msg?"block":"none";
}

function sc(s){ return s>=8?"var(--ice)":s>=6?"var(--gold)":"var(--mute)"; }
function tagCls(c){ return {saas:"t-saas",app:"t-app","ai-tool":"t-ai-tool",fintech:"t-fintech"}[c]||"t-saas"; }

function buildEmail(lead){
  var n = document.getElementById("iName").value||"Daniel";
  var p = document.getElementById("iPortfolio").value||"https://danielrua.my.canva.site/";
  var s = {
    "Notion":{subject:"UGC collab — "+n+" x Notion",body:"Hey Notion team,\n\nI'm "+n+", a UGC filmmaker and photographer who creates content for tech and app brands. I came across your UGC program and I'd love to create authentic app walkthrough videos that show real workflows — no ads-y feel, just genuine storytelling.\n\nPortfolio: "+p+"\n\nWould love to connect if you're still looking for creators.\n\n"+n},
    "Captions AI":{subject:n+" — UGC filmmaker interested in Captions AI",body:"Hi Captions team,\n\nI'm "+n+", a bilingual filmmaker who creates UGC for tech brands. Captions AI is exactly the kind of product I love making content for — I can show the real editing workflow, captions in action, and b-roll features in a way that feels authentic.\n\nPortfolio: "+p+"\n\nOpen to a collab whenever you're ready.\n\n"+n},
    "Superhuman":{subject:"UGC creator interested in Superhuman collab",body:"Hey Superhuman team,\n\nSaw you're looking for power-user testimonials — I'm "+n+", a UGC filmmaker who creates authentic content that converts.\n\nPortfolio: "+p+"\n\nWould love to be part of this.\n\n"+n},
    "Runway ML":{subject:n+" x Runway — UGC filmmaker",body:"Hi Runway team,\n\nI'm "+n+", a filmmaker creating UGC for tech and AI brands. I can create before/after content and creation showcases that feel real, not produced.\n\nPortfolio: "+p+"\n\nLet me know if you're open to a collab.\n\n"+n},
    "Loom":{subject:n+" — UGC creator for Loom",body:"Hey Loom team,\n\nI'm "+n+", a bilingual UGC filmmaker. I can create authentic async video demos that show real team workflows, not scripted ads.\n\nPortfolio: "+p+"\n\nOpen to connecting.\n\n"+n},
  };
  if(s[lead.company]) return s[lead.company];
  return {
    subject:n+" — UGC filmmaker interested in "+lead.company,
    body:"Hi "+lead.company+" team,\n\nI'm "+n+", a bilingual UGC filmmaker and photographer specializing in "+lead.needsContent.toLowerCase()+" for tech and app brands. I create content that feels authentic — not polished ads.\n\nPortfolio: "+p+"\n\nWould love to connect about a collab.\n\n"+n
  };
}

function updateStats(){
  var approved = Object.values(decisions).filter(function(v){return v==="approved";}).length;
  var sent = Object.keys(sentSet).length;
  document.getElementById("statFound").textContent = builtLeads.length;
  document.getElementById("statApproved").textContent = approved;
  document.getElementById("statSent").textContent = sent;
  document.getElementById("statsBar").style.display = builtLeads.length>0?"flex":"none";
  var sb = document.getElementById("sendBtn");
  sb.style.display = approved>0?"inline-flex":"none";
  sb.textContent = "Send "+approved+" via Railway";
}

function renderLeads(){
  var wrap = document.getElementById("leadsWrap");
  if(builtLeads.length===0){ wrap.innerHTML = ""; return; }

  var html = '<div class="section-hdr"><span class="section-title">Leads & Email Drafts</span><span class="section-count">'+builtLeads.length+' total</span></div>';

  builtLeads.forEach(function(lead,i){
    var d = decisions[i]||"";
    var isSent = !!sentSet[i];
    var cls = "lead"+(isSent?" sent":d?" "+d:"");
    var bodyId = "body-"+i;

    html += '<div class="'+cls+'" id="lead-'+i+'">';
    if(isSent) html += '<span class="sent-tag">✓ SENT</span>';
    html += '<div class="lname">'+lead.company+'</div>';
    html += '<div class="lmeta">';
    if(lead.postedRecently) html += '<span class="tag t-hot">Recent</span>';
    html += '<span class="tag '+tagCls(lead.category)+'">'+lead.category+'</span>';
    html += '<span class="lsource"> '+lead.source+'</span>';
    if(lead.contactEmail) html += ' &middot; <span class="lemail">'+lead.contactEmail+'</span>';
    if(lead.contactHandle) html += ' &middot; '+lead.contactHandle;
    html += '</div>';
    html += '<div class="sbar-row"><div class="sbar"><div class="sfill" style="width:'+(lead.score*10)+'%;background:'+sc(lead.score)+'"></div></div><div class="sval" style="color:'+sc(lead.score)+'">'+lead.score+'/10</div></div>';
    html += '<div class="reason">'+lead.scoreReason+'</div>';
    html += '<div class="esubj">Subject: '+lead.email.subject+'</div>';
    html += '<div class="ebody" id="'+bodyId+'" '+(d==="approved"&&!isSent?'contenteditable="true"':'')+'>'+lead.email.body+'</div>';
    if(!isSent){
      html += '<div class="actions">';
      if(d!=="approved") html += '<button class="la la-app" onclick="decide('+i+',\'approved\')">Approve</button>';
      if(d!=="rejected") html += '<button class="la la-rej" onclick="decide('+i+',\'rejected\')">Reject</button>';
      if(lead.sourceUrl) html += '<a class="la-link" href="'+lead.sourceUrl+'" target="_blank">View Post</a>';
      if(d==="approved") html += '<span style="font-size:10px;color:var(--ice);margin-left:auto">Edit body above if needed</span>';
      html += '</div>';
    }
    html += '</div>';
  });

  wrap.innerHTML = html;
}

function decide(i, verdict){
  decisions[i] = verdict;
  addLog((verdict==="approved"?"Approved: ":"Rejected: ")+builtLeads[i].company, verdict==="approved"?"ice":"red");
  renderLeads();
  updateStats();
}

function approveAll(){
  builtLeads.forEach(function(_,i){ if(!sentSet[i]) decisions[i]="approved"; });
  addLog("Approved all "+builtLeads.length+" leads","ice");
  renderLeads();
  updateStats();
}

async function runPipeline(){
  decisions={}; sentSet={}; builtLeads=[];
  document.getElementById("leadsWrap").innerHTML="";
  document.getElementById("logBox").innerHTML="";
  document.getElementById("logBox").style.display="none";
  document.getElementById("successBox").style.display="none";
  document.getElementById("approveBtn").style.display="none";
  document.getElementById("sendBtn").style.display="none";
  document.getElementById("resetBtn").style.display="none";
  showErr("");

  var runBtn = document.getElementById("runBtn");
  runBtn.disabled = true;
  runBtn.innerHTML = '<span class="spin"></span> Scraping...';

  addLog("Scraping Reddit, Product Hunt...", "gold");

  var scrapedLeads = [];
  try {
    var res = await fetch(RAILWAY+"/scrape");
    if(res.ok){
      var data = await res.json();
      scrapedLeads = data.leads || [];
      var srcs = data.sources || {};
      addLog("Reddit: "+srcs.reddit+" leads", "ice");
      addLog("Product Hunt: "+srcs.productHunt+" leads", "ice");
      if(srcs.google) addLog("Google: "+srcs.google+" leads", "ice");

      document.getElementById("src-reddit").className = "src " + (srcs.reddit>0?"active":"");
      document.getElementById("src-ph").className = "src " + (srcs.productHunt>0?"active":"");
    } else {
      throw new Error("Scrape endpoint error");
    }
  } catch(e) {
    addLog("Live scrape failed — using curated leads: "+e.message, "gold");
    scrapedLeads = [];
  }

  // Merge scraped + curated, dedupe by company name
  var allLeads = [...scrapedLeads, ...STATIC_LEADS];
  var seen = new Set();
  var deduped = allLeads.filter(function(l){
    if(seen.has(l.company)) return false;
    seen.add(l.company);
    return true;
  });

  var sorted = deduped.sort(function(a,b){return b.score-a.score;});

  builtLeads = sorted.map(function(lead){
    return Object.assign({},lead,{email:buildEmail(lead)});
  });

  document.getElementById("src-static").className = "src active";
  addLog("Total: "+builtLeads.length+" leads found and scored", "ice");
  addLog("Emails drafted — approve below then send", "gold");

  document.getElementById("approveBtn").style.display="inline-flex";
  document.getElementById("resetBtn").style.display="inline-flex";

  runBtn.disabled = false;
  runBtn.innerHTML = "&#9654; Run Pipeline";

  renderLeads();
  updateStats();
}

async function sendAll(){
  var toSend = builtLeads.map(function(l,i){return{lead:l,i:i};})
    .filter(function(x){return decisions[x.i]==="approved"&&!sentSet[x.i];});
  if(!toSend.length) return;

  var sb = document.getElementById("sendBtn");
  sb.disabled = true;
  sb.innerHTML = '<span class="spin"></span> Sending...';
  addLog("Sending "+toSend.length+" emails via Railway...", "gold");

  var emails = toSend.map(function(item){
    var lead=item.lead, i=item.i;
    var bodyEl=document.getElementById("body-"+i);
    var body=bodyEl?(bodyEl.innerText||bodyEl.textContent):lead.email.body;
    var toAddr=lead.contactEmail||("hello@"+lead.company.toLowerCase().replace(/[^a-z0-9]/g,"")+".com");
    return{to:toAddr,subject:lead.email.subject,body:body,company:lead.company};
  });

  try{
    var res = await fetch(RAILWAY+"/send-batch",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({emails:emails})
    });
    if(!res.ok) throw new Error("Server error "+res.status);
    var data = await res.json();
    toSend.forEach(function(item){sentSet[item.i]=true;});
    renderLeads();
    document.getElementById("successNum").textContent=data.summary.sent+" EMAILS SENT ";
    document.getElementById("successBox").style.display="block";
    addLog("Done — "+data.summary.sent+" sent, "+data.summary.failed+" failed","green");
    if(data.results) data.results.forEach(function(r){if(!r.success)addLog("Failed: "+r.company+" — "+r.error,"red");});
  }catch(e){
    showErr("Send failed: "+e.message);
    addLog("Error: "+e.message,"red");
  }

  sb.disabled=false;
  updateStats();
}

function resetAll(){
  decisions={}; sentSet={}; builtLeads=[];
  document.getElementById("leadsWrap").innerHTML="";
  document.getElementById("logBox").innerHTML="";
  document.getElementById("logBox").style.display="none";
  document.getElementById("successBox").style.display="none";
  document.getElementById("statsBar").style.display="none";
  document.getElementById("approveBtn").style.display="none";
  document.getElementById("sendBtn").style.display="none";
  document.getElementById("resetBtn").style.display="none";
  showErr("");
}
</script>

</body>
</html>
